<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>展会客户信息识别与整理</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f1f5f9; min-height: 100vh; }
    .header { background: linear-gradient(135deg, #1e40af, #1d4ed8); color: white; padding: 16px; position: sticky; top: 0; z-index: 20; }
    .header h1 { font-size: 18px; font-weight: bold; }
    .header button { position: absolute; top: 12px; right: 12px; background: rgba(255,255,255,0.2); border: none; border-radius: 8px; padding: 8px 12px; color: white; cursor: pointer; }
    .nav { background: white; display: flex; border-bottom: 1px solid #e2e8f0; position: sticky; top: 60px; z-index: 20; }
    .nav button { flex: 1; padding: 12px; background: none; border: none; font-size: 14px; font-weight: 500; color: #64748b; border-bottom: 2px solid transparent; cursor: pointer; }
    .nav button.active { color: #1d4ed8; border-bottom-color: #1d4ed8; }
    .page { padding: 16px; display: none; }
    .page.active { display: block; }
    .upload-zone { border: 2px dashed #cbd5e1; border-radius: 16px; padding: 40px 20px; text-align: center; cursor: pointer; background: white; margin-bottom: 16px; }
    .upload-zone .icon { font-size: 48px; margin-bottom: 8px; }
    .upload-zone p { color: #475569; font-weight: 500; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 16px; border-radius: 8px; font-weight: 500; cursor: pointer; border: none; font-size: 14px; }
    .btn-primary { background: #1d4ed8; color: white; }
    .btn-secondary { background: white; color: #475569; border: 1px solid #e2e8f0; }
    .btn-success { background: #16a34a; color: white; }
    .btn-danger { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    .btn-sm { padding: 6px 10px; font-size: 13px; }
    .btn-lg { padding: 14px 20px; font-size: 16px; }
    .w-full { width: 100%; }
    .hidden { display: none !important; }
    .customer-card { background: white; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 16px; overflow: hidden; }
    .customer-card-header { background: linear-gradient(135deg, #1d4ed8, #1e40af); color: white; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
    .customer-card-header .title { font-weight: 600; }
    .customer-card-body { padding: 16px; }
    .data-preview { background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
    .data-preview h4 { font-size: 13px; color: #92400e; margin-bottom: 8px; }
    .data-preview .row { display: flex; gap: 12px; margin-bottom: 4px; font-size: 13px; }
    .data-preview .label { color: #a16207; min-width: 50px; }
    .data-preview .value { color: #ca8a04; font-weight: 500; }
    .form-container { background: white; border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; margin-bottom: 12px; }
    .form-container iframe { width: 100%; height: 450px; border: none; display: block; }
    .submit-section { border-top: 1px solid #f1f5f9; padding: 12px 16px; }
    .submit-section p { font-size: 11px; color: #94a3b8; text-align: center; margin-top: 6px; }
    .empty-state { text-align: center; padding: 60px 20px; color: #94a3b8; }
    .empty-state .icon { font-size: 56px; margin-bottom: 12px; }
    .img-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 12px; }
    .img-grid .img-item { position: relative; aspect-ratio: 1; }
    .img-grid .img-item img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; border: 2px solid #e2e8f0; }
    .img-grid .img-item .del { position: absolute; top: -6px; right: -6px; width: 22px; height: 22px; background: #ef4444; color: white; border: none; border-radius: 50%; font-size: 12px; cursor: pointer; }
    .loading { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; display: none; align-items: center; justify-content: center; }
    .loading.show { display: flex; }
    .loading-box { background: white; padding: 32px; border-radius: 16px; text-align: center; max-width: 280px; }
    .loading-box .icon { font-size: 48px; margin-bottom: 12px; }
    .loading-box p { font-weight: 600; font-size: 16px; }
    .toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: #16a34a; color: white; padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 500; z-index: 300; display: none; }
    .toast.show { display: block; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.show { display: flex; }
    .modal { background: white; width: 100%; max-width: 480px; border-radius: 16px; overflow: hidden; }
    .modal-header { padding: 16px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; font-weight: 600; }
    .modal-body { padding: 16px; }
    .modal-footer { padding: 16px; border-top: 1px solid #e2e8f0; display: flex; gap: 12px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 14px; font-weight: 500; color: #374151; margin-bottom: 6px; }
    .form-group input, .form-group select { width: 100%; padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; }
  </style>
</head>
<body>
  <header class="header">
    <h1>📇 展会客户信息识别</h1>
    <button onclick="openSettings()">⚙️</button>
  </header>

  <nav class="nav">
    <button class="active" data-tab="upload" onclick="switchTab('upload')">📤 上传识别</button>
    <button data-tab="records" onclick="switchTab('records')">📋 客户记录</button>
  </nav>

  <main>
    <section id="page-upload" class="page active">
      <div class="upload-zone" onclick="document.getElementById('file-input').click()">
        <div class="icon">📸</div>
        <p>点击上传 / 拖拽图片</p>
      </div>
      <input type="file" id="file-input" accept="image/*" multiple style="display:none" onchange="handleFiles(this.files)">
      
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <button class="btn btn-primary w-full" onclick="document.getElementById('camera-input').click()">📷 拍照</button>
        <input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none" onchange="handleFiles(this.files)">
        <button class="btn btn-secondary w-full" onclick="document.getElementById('gallery-input').click()">🖼️ 相册</button>
        <input type="file" id="gallery-input" accept="image/*" multiple style="display:none" onchange="handleFiles(this.files)">
      </div>
      
      <div id="preview-section" class="hidden" style="margin-bottom:12px">
        <span style="font-size:13px;font-weight:500">已上传 <span id="img-count">0</span> 张图片</span>
        <div id="preview-grid" class="img-grid"></div>
      </div>
      
      <button id="btn-recognize" class="btn btn-primary btn-lg w-full hidden" onclick="startRecognize()">🧠 开始识别</button>
    </section>

    <section id="page-records" class="page">
      <div id="records-empty" class="empty-state">
        <div class="icon">📋</div>
        <p>暂无识别记录</p>
      </div>
      <div id="records-list"></div>
    </section>
  </main>

  <div id="loading" class="loading">
    <div class="loading-box">
      <div class="icon">🧠</div>
      <p id="loading-text">识别中...</p>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <div id="settings-modal" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <span>⚙️ 模型设置</span>
        <button onclick="closeSettings()" style="background:none;border:none;font-size:24px;color:#94a3b8;cursor:pointer">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>🔑 API Key</label>
          <input type="password" id="input-api-key" placeholder="sk-or-v1-..." autocomplete="off">
        </div>
        <div class="form-group">
          <label>🤖 模型</label>
          <select id="input-model">
            <option value="google/gemini-2.0-flash-001">Gemini 2.0 Flash</option>
            <option value="anthropic/claude-sonnet-4">Claude Sonnet 4</option>
          </select>
        </div>
        <div class="form-group">
          <label>🔄 识别模式</label>
          <select id="input-mode">
            <option value="mock">Mock 模拟数据</option>
            <option value="real">真实 AI 识别</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-danger" onclick="clearSettings()" style="flex:1">清除</button>
        <button class="btn btn-primary" onclick="saveSettings()" style="flex:1">保存</button>
      </div>
    </div>
  </div>

<script>
var CONFIG = {
  PARDOT_FORM_URL: 'https://go.rifeng.com/l/900071/2026-03-26/3tbjg2',
  FIELD_MAP: {
    'Name': 'Name',
    'Company': 'Company',
    'email': 'Email',
    'Website': 'Website',
    'Title': 'Job Title',
    'Nation': 'Country',
    'Continent': 'Continent',
    'Address': 'Address',
    'Phone': 'Phone',
    'Mobile': 'Mobile',
    'InterestedIn': 'Interested In',
    'TypeOfClients': 'Type of Client',
    'DemandDetails': 'Demand details'
  }
};

var state = { images: [], records: [] };
var modelConfig = { apiKey: '', model: 'google/gemini-2.0-flash-001', mode: 'mock' };

function loadSettings() {
  try {
    var s = localStorage.getItem('exhibition_leads_settings');
    if (s) { var p = JSON.parse(s); for (var k in p) modelConfig[k] = p[k]; }
  } catch(e) {}
}
loadSettings();

function openSettings() { loadSettings(); document.getElementById('input-api-key').value = modelConfig.apiKey; document.getElementById('input-model').value = modelConfig.model; document.getElementById('input-mode').value = modelConfig.mode; document.getElementById('settings-modal').classList.add('show'); }
function closeSettings() { document.getElementById('settings-modal').classList.remove('show'); }
function saveSettings() { modelConfig.apiKey = document.getElementById('input-api-key').value.trim(); modelConfig.model = document.getElementById('input-model').value; modelConfig.mode = document.getElementById('input-mode').value; localStorage.setItem('exhibition_leads_settings', JSON.stringify(modelConfig)); closeSettings(); showToast('设置已保存'); }
function clearSettings() { if (!confirm('清除所有设置？')) return; localStorage.removeItem('exhibition_leads_settings'); modelConfig = { apiKey: '', model: 'google/gemini-2.0-flash-001', mode: 'mock' }; document.getElementById('input-api-key').value = ''; document.getElementById('input-model').value = modelConfig.model; document.getElementById('input-mode').value = modelConfig.mode; showToast('已清除'); }
function isRealMode() { return modelConfig.mode === 'real' && modelConfig.apiKey; }
function genId() { return 'r_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9); }
function escapeHtml(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg) { var t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(function() { t.classList.remove('show'); }, 2500); }

function switchTab(tab) {
  document.querySelectorAll('.nav button').forEach(function(b) { b.classList.toggle('active', b.dataset.tab === tab); });
  document.querySelectorAll('.page').forEach(function(p) { p.classList.toggle('active', p.id === 'page-' + tab); });
  if (tab === 'records') renderRecords();
}

function handleFiles(files) {
  Array.from(files).forEach(function(f) {
    if (!f.type.startsWith('image/')) return;
    state.images.push({ id: genId(), file: f, url: URL.createObjectURL(f) });
  });
  updatePreview();
}

function removeImage(id) {
  var img = state.images.find(function(i) { return i.id === id; });
  if (img) URL.revokeObjectURL(img.url);
  state.images = state.images.filter(function(i) { return i.id !== id; });
  updatePreview();
}

function updatePreview() {
  var n = state.images.length;
  document.getElementById('preview-section').classList.toggle('hidden', n === 0);
  document.getElementById('btn-recognize').classList.toggle('hidden', n === 0);
  document.getElementById('img-count').textContent = n;
  document.getElementById('preview-grid').innerHTML = state.images.map(function(img, i) {
    return '<div class="img-item"><img src="' + img.url + '"><button class="del" onclick="removeImage(\'' + img.id + '\')">×</button></div>';
  }).join('');
}

var dz = document.querySelector('.upload-zone');
dz.addEventListener('dragover', function(e) { e.preventDefault(); });
dz.addEventListener('drop', function(e) { e.preventDefault(); handleFiles(e.dataTransfer.files); });

var MOCK = {
  names: ['Michael Brown', 'Sarah Johnson', 'Hans Schmidt', 'Yuki Yamamoto', 'Ahmed Al-Rashid', 'Marie Dupont', 'Chen Wei', 'Anna Kowalski'],
  titles: ['Sales Manager', 'CEO', 'Purchasing Director', 'Engineer', 'Marketing Manager', 'Product Manager'],
  companies: ['Global Trade Co.', 'Pacific Solutions', 'Euro Asia Ltd.', 'Sunrise Technologies', 'Metro Construct GmbH'],
  countries: ['Germany', 'United States', 'China', 'Japan', 'France', 'Singapore', 'UAE', 'Australia'],
  continents: { Germany: 'Europe', France: 'Europe', 'United States': 'North America', China: 'Asia', Japan: 'Asia', Singapore: 'Asia', UAE: 'Asia', Australia: 'Oceania' },
  types: ['Distributor', 'Contractor', 'Wholesaler', 'Retailer', 'OEM'],
  products: ['PEX Pipe', 'PE-RT Pipe', 'Floor Heating', 'Water Supply', 'Solar Heating']
};

function rnd(a) { return a[Math.floor(Math.random() * a.length)]; }
function maybe(v) { return Math.random() > 0.2 ? v : ''; }

function generateMock() {
  var name = rnd(MOCK.names);
  var country = rnd(MOCK.countries);
  return {
    id: genId(),
    Name: name,
    Title: maybe(rnd(MOCK.titles)),
    email: name.toLowerCase().split(' ')[0] + '@' + rnd(['gmail.com', 'outlook.com', 'company.co']),
    Website: 'www.' + name.toLowerCase().replace(/ /g,'') + '.com',
    Address: country,
    Company: rnd(MOCK.companies),
    Continent: MOCK.continents[country],
    Nation: country,
    Phone: '+' + (100 + Math.floor(Math.random() * 900)) + ' ' + Math.floor(Math.random() * 90000000),
    Mobile: '+' + (100 + Math.floor(Math.random() * 900)) + ' ' + Math.floor(Math.random() * 900000000),
    TypeOfClients: rnd(MOCK.types),
    InterestedIn: rnd(MOCK.products),
    DemandDetails: 'Interested in bulk order'
  };
}

async function callAI(files) {
  var RECOGNITION_PROMPT = 'Extract customer info from business card/form images. Return JSON array with fields: Name, Title, email, Website, Address, Company, Continent, Nation, Phone, Mobile, TypeOfClients, InterestedIn, DemandDetails. Use ONLY these field names in English. Return valid JSON array only.';
  
  var imageContents = [];
  for (var i = 0; i < files.length; i++) {
    var base64 = await new Promise(function(resolve, reject) {
      var r = new FileReader();
      r.onload = function() { resolve(r.result.split(',')[1]); };
      r.onerror = reject;
      r.readAsDataURL(files[i]);
    });
    imageContents.push({ type: 'image_url', image_url: { url: 'data:' + files[i].type + ';base64,' + base64 } });
  }
  
  var resp = await fetch('https://openrouter.ai/api/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + modelConfig.apiKey, 'HTTP-Referer': location.href, 'X-Title': 'Exhibition Lead Tool' },
    body: JSON.stringify({ model: modelConfig.model, messages: [{ role: 'user', content: [{ type: 'text', text: RECOGNITION_PROMPT }].concat(imageContents) }], max_tokens: 4096 })
  });
  
  if (!resp.ok) throw new Error('API error ' + resp.status);
  var data = await resp.json();
  var content = data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content || '';
  
  var parsed;
  try { parsed = JSON.parse(content); }
  catch(e) {
    var m = content.match(/```(?:json)?\s*([\s\S]*?)```/);
    if (m) { try { parsed = JSON.parse(m[1].trim()); } catch(e2) {} }
    if (!parsed) { m = content.match(/\[[\s\S]*\]/); if (m) { try { parsed = JSON.parse(m[0]); } catch(e3) {} } }
    if (!parsed) throw new Error('Cannot parse JSON');
  }
  if (!Array.isArray(parsed)) parsed = [parsed];
  
  return parsed.map(function(item) {
    var r = { id: genId() };
    ['Name', 'Title', 'email', 'Website', 'Address', 'Company', 'Continent', 'Nation', 'Phone', 'Mobile', 'TypeOfClients', 'InterestedIn', 'DemandDetails'].forEach(function(f) { r[f] = String(item[f] || '').trim(); });
    return r;
  });
}

async function startRecognize() {
  if (state.images.length === 0) { alert('Please upload images first'); return; }
  if (isRealMode()) { if (!confirm('Use real AI model? (will consume API credits)')) return; }
  
  document.getElementById('loading').classList.add('show');
  document.getElementById('loading-text').textContent = isRealMode() ? 'AI recognizing...' : 'Generating data...';
  
  try {
    var records;
    if (isRealMode()) {
      records = await callAI(state.images.map(function(i) { return i.file; }));
    } else {
      await new Promise(function(r) { setTimeout(r, 1800); });
      records = state.images.map(function() { return generateMock(); });
    }
    
    setTimeout(function() {
      state.records = records;
      document.getElementById('loading').classList.remove('show');
      switchTab('records');
      showToast('Recognition complete! ' + records.length + ' records');
    }, 400);
  } catch(err) {
    document.getElementById('loading').classList.remove('show');
    alert('Recognition failed: ' + (err.message || 'Unknown error'));
  }
}

function renderRecords() {
  var empty = document.getElementById('records-empty');
  var list = document.getElementById('records-list');
  
  if (state.records.length === 0) {
    empty.style.display = 'block';
    list.innerHTML = '';
    return;
  }
  
  empty.style.display = 'none';
  list.innerHTML = state.records.map(function(rec, i) {
    var params = [];
    for (var internalField in CONFIG.FIELD_MAP) {
      var pardotField = CONFIG.FIELD_MAP[internalField];
      var value = rec[internalField];
      if (value && String(value).trim()) {
        params.push(pardotField + '=' + encodeURIComponent(String(value).trim()));
      }
    }
    var formUrl = CONFIG.PARDOT_FORM_URL;
    if (params.length > 0) {
      formUrl += '?' + params.join('&');
    }
    
    console.log('Record ' + i + ':', rec);
    console.log('Generated URL:', formUrl);
    
    return '<div class="customer-card" id="card-' + rec.id + '">' +
      '<div class="customer-card-header">' +
        '<div class="title"><span>Customer ' + (i + 1) + '</span> ' + escapeHtml(rec.Company || rec.Name || '') + '</div>' +
        '<div class="actions">' +
          '<button class="btn btn-sm btn-danger" onclick="deleteRecord(\'' + rec.id + '\')">Delete</button>' +
        '</div>' +
      '</div>' +
      '<div class="customer-card-body">' +
        '<div class="data-preview">' +
          '<h4>Recognized Data:</h4>' +
          '<div class="row"><span class="label">Email:</span><span class="value">' + escapeHtml(rec.email || '(empty)') + '</span></div>' +
          '<div class="row"><span class="label">Name:</span><span class="value">' + escapeHtml(rec.Name || '(empty)') + '</span></div>' +
          '<div class="row"><span class="label">Company:</span><span class="value">' + escapeHtml(rec.Company || '(empty)') + '</span></div>' +
          '<div class="row"><span class="label">Title:</span><span class="value">' + escapeHtml(rec.Title || '(empty)') + '</span></div>' +
        '</div>' +
        '<div class="form-container">' +
          '<iframe id="form-iframe-' + rec.id + '" src="' + formUrl + '" style="width:100%;height:400px;border:none;display:block;background:white" onload="tryFillForm(\'' + rec.id + '\', ' + JSON.stringify(rec).replace(/'/g, "\\'") + ')"></iframe>' +
        '</div>' +
      '</div>' +
      '<div class="submit-section">' +
        '<button class="btn btn-success btn-lg w-full" onclick="submitToPardot(\'' + rec.id + '\')">Submit to Pardot</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

function tryFillForm(id, rec) {
  var iframe = document.getElementById('form-iframe-' + id);
  if (!iframe) return;
  
  setTimeout(function() {
    try {
      var doc = iframe.contentDocument || iframe.contentWindow.document;
      if (!doc) return;
      
      var inputs = doc.querySelectorAll('input, textarea');
      console.log('Found ' + inputs.length + ' fields in iframe');
      
      var fieldMatchers = {
        'email': ['email', 'e-mail', 'mail'],
        'Name': ['name', 'fullname', 'first_name', 'firstname'],
        'Company': ['company', 'company_name', 'companyname'],
        'Title': ['title', 'job_title', 'jobtitle', 'position'],
        'Phone': ['phone', 'telephone', 'tel'],
        'Mobile': ['mobile', 'cell', 'cellphone'],
        'Website': ['website', 'web', 'url'],
        'Address': ['address', 'location'],
        'Nation': ['country', 'nation'],
        'Continent': ['continent', 'area'],
        'InterestedIn': ['interested', 'interest', 'product'],
        'TypeOfClients': ['type', 'client_type', 'customer_type'],
        'DemandDetails': ['demand', 'details', 'notes', 'remarks', 'memo']
      };
      
      var filled = 0;
      for (var fieldKey in fieldMatchers) {
        var value = rec[fieldKey];
        if (!value || !String(value).trim()) continue;
        
        var matchers = fieldMatchers[fieldKey];
        for (var i = 0; i < inputs.length; i++) {
          var inp = inputs[i];
          var name = (inp.name || '').toLowerCase();
          var id_attr = (inp.id || '').toLowerCase();
          
          for (var j = 0; j < matchers.length; j++) {
            if (name.includes(matchers[j]) || id_attr.includes(matchers[j])) {
              inp.value = String(value).trim();
              inp.dispatchEvent(new Event('input', { bubbles: true }));
              inp.dispatchEvent(new Event('change', { bubbles: true }));
              filled++;
              console.log('Filled ' + fieldKey + ' -> ' + inp.name);
              break;
            }
          }
        }
      }
      console.log('Total filled: ' + filled);
    } catch(e) {
      console.log('Cannot fill iframe (cross-origin): ' + e.message);
    }
  }, 1000);
}

function submitToPardot(id) {
  var rec = state.records.find(function(r) { return r.id === id; });
  if (!rec) return;
  
  if (!rec.email || !rec.email.trim()) {
    alert('Email is required');
    return;
  }
  
  if (!confirm('Submit to Pardot?\n\nEmail: ' + rec.email + '\nCompany: ' + (rec.Company || '-') + '\nName: ' + (rec.Name || '-'))) return;
  
  var formHtml = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Submitting...</title></head>';
  formHtml += '<body style="font-family:Arial;padding:40px;text-align:center">';
  formHtml += '<h2 style="color:#1d4ed8">Submitting to Pardot...</h2>';
  formHtml += '<p>Please wait</p>';
  formHtml += '<form id="f" method="POST" action="https://go.rifeng.com/l/900071/2026-03-18/3t99mv">';
  
  for (var internalField in CONFIG.FIELD_MAP) {
    var pardotField = CONFIG.FIELD_MAP[internalField];
    var value = rec[internalField];
    if (value && String(value).trim()) {
      formHtml += '<input type="hidden" name="' + pardotField + '" value="' + String(value).replace(/"/g, '&quot;') + '">';
    }
  }
  
  formHtml += '</form>';
  formHtml += '<script>document.getElementById("f").submit();<' + '/script>';
  formHtml += '</body></html>';
  
  var blob = new Blob([formHtml], { type: 'text/html' });

  setTimeout(function() {
    state.records = state.records.filter(function(r) { return r.id !== id; });

    showToast('Submitted! Record deleted.');

}

function deleteRecord(id) {
  if (!confirm('Delete this record?')) return;
  state.records = state.records.filter(function(r) { return r.id !== id; });
  renderRecords();
  showToast('Deleted');
}
